<html lang="es">

<title>Performance Comercial</title>
<style>
:root {
  --navy: #0b1e36;
  --navy2: #0d2540;
  --navy3: #112d4e;
  --navy4: #163a5f;
  --green-dark: #0b4f3a;
  --green-mid: #0e6b4f;
  --green-accent: #17936a;
  --green-light: #20c98a;
  --green-glow: rgba(32,201,138,0.15);
  --gold: #f59e0b;
  --red: #ef4444;
  --text: #e2e8f0;
  --text-muted: #7a91aa;
  --border: rgba(255,255,255,0.07);
  --row-hover: rgba(17,147,106,0.07);
  --halo1: rgba(251,146,60,0.4);
  --halo2: rgba(249,115,22,0.65);
  --halo3: rgba(234,88,12,0.9);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--navy);color:var(--text);min-height:100vh;}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--navy2) 0%,var(--green-dark) 100%);
  padding:22px 32px;
  border-bottom:2px solid var(--green-accent);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;
}
.header-brand{display:flex;align-items:center;gap:14px;}
.header-logo{
  width:46px;height:46px;border-radius:12px;
  background:linear-gradient(135deg,var(--green-mid),var(--green-accent));
  display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:0 0 20px rgba(32,201,138,0.3);
}
.header-title h1{font-size:1.4rem;font-weight:700;color:var(--green-light);letter-spacing:.5px;}
.header-title p{font-size:.75rem;color:var(--text-muted);margin-top:3px;}
.stats-row{display:flex;gap:12px;flex-wrap:wrap;}
.stat-card{
  background:rgba(255,255,255,0.05);border:1px solid var(--border);
  border-radius:10px;padding:8px 16px;text-align:center;min-width:80px;
}
.stat-card .sv{font-size:1.2rem;font-weight:700;color:var(--green-light);}
.stat-card .sl{font-size:.65rem;color:var(--text-muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}

/* CONTROLES */
.controls{
  padding:14px 32px;background:var(--navy2);
  border-bottom:1px solid var(--border);
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;
}
.search{
  padding:8px 14px;border-radius:8px;border:1px solid var(--border);
  background:rgba(255,255,255,0.04);color:var(--text);font-size:.8rem;
  width:230px;outline:none;transition:border .2s;
}
.search:focus{border-color:var(--green-accent);}
.search::placeholder{color:var(--text-muted);}
.btn{
  padding:7px 16px;border-radius:8px;border:1px solid var(--border);
  background:rgba(255,255,255,0.04);color:var(--text-muted);
  cursor:pointer;font-size:.75rem;font-weight:500;transition:all .2s;white-space:nowrap;
}
.btn:hover,.btn.active{background:var(--green-mid);border-color:var(--green-accent);color:#fff;}

/* LEYENDA */
.legend{
  padding:10px 32px;background:var(--navy);
  border-bottom:1px solid var(--border);
  display:flex;gap:18px;flex-wrap:wrap;align-items:center;
}
.leg{display:flex;align-items:center;gap:7px;font-size:.72rem;color:var(--text-muted);}
.leg-ic{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;}

/* TABLA */
.table-wrap{overflow-x:auto;padding:0 32px 48px;}
table{width:100%;border-collapse:collapse;font-size:.77rem;min-width:1000px;}

thead th{
  background:var(--navy3);color:var(--text-muted);font-weight:600;
  font-size:.68rem;text-transform:uppercase;letter-spacing:.6px;
  padding:11px 7px;text-align:center;border-bottom:2px solid var(--green-dark);
  position:sticky;top:0;z-index:2;white-space:nowrap;
}
thead th:first-child{
  text-align:left;padding-left:16px;min-width:230px;
  position:sticky;left:0;z-index:3;background:var(--navy3);
}

tbody tr{border-bottom:1px solid var(--border);transition:background .15s;}
tbody tr:hover{background:var(--row-hover);}
tbody tr.hidden{display:none;}

td{padding:8px 7px;text-align:center;vertical-align:middle;}
td:first-child{
  text-align:left;padding-left:14px;
  position:sticky;left:0;background:var(--navy);z-index:1;
}
tbody tr:hover td:first-child{background:#0d2a1c;}

/* AVATAR + NOMBRE */
.exec-wrap{display:flex;align-items:center;gap:10px;}
.avatar{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:700;color:#fff;letter-spacing:.5px;
  border:2px solid rgba(255,255,255,0.1);
}
.exec-info .en{font-weight:500;color:var(--text);font-size:.78rem;line-height:1.3;}

/* SCORE */
.score-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
.score-num{font-weight:700;font-size:.88rem;}
.score-bar{width:38px;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.score-fill{height:100%;border-radius:2px;transition:width .3s;}

/* PILLS */
.pill{display:inline-block;padding:3px 9px;border-radius:10px;font-size:.67rem;font-weight:600;white-space:nowrap;}
.pill-ok{background:rgba(32,201,138,0.15);color:#4ade80;border:1px solid rgba(32,201,138,0.3);}
.pill-nok{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.25);}
.pill-aplica{background:rgba(56,189,248,0.12);color:#38bdf8;border:1px solid rgba(56,189,248,0.25);}
.pill-no{background:rgba(255,255,255,0.04);color:var(--text-muted);border:1px solid var(--border);}

/* ICONO CON HALO */
.ic{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;margin:0 auto;cursor:default;
  transition:transform .15s;position:relative;
}
.ic:hover{transform:scale(1.25);}
.h0{box-shadow:none;background:transparent;}
.h1{
  background:rgba(251,146,60,0.06);
  box-shadow:0 0 0 3px var(--halo1),0 0 8px 1px rgba(251,146,60,0.2);
}
.h2{
  background:rgba(249,115,22,0.1);
  box-shadow:0 0 0 4px var(--halo2),0 0 12px 3px rgba(249,115,22,0.3);
}
.h3{
  background:rgba(234,88,12,0.14);
  box-shadow:0 0 0 5px var(--halo3),0 0 18px 5px rgba(234,88,12,0.45);
}

/* FOOTER */
tfoot td{
  background:var(--navy3);font-weight:600;font-size:.72rem;
  padding:10px 7px;border-top:2px solid var(--green-dark);
  color:var(--text-muted);text-align:center;
}
tfoot td:first-child{
  text-align:left;padding-left:16px;
  position:sticky;left:0;background:var(--navy3);color:var(--green-light);
}
.fg{color:var(--green-light);}
.fm{color:var(--gold);}
.fr{color:#f87171;}
</style>

let filtroAct='todos';

function avatarBg(n){let s=0;for(let c of n)s+=c.charCodeAt(0);return PALETA[s%PALETA.length];}
function getInitials(n){const p=n.trim().split(' ');return(p[0][0]+(p[p.length-1]?.[0]||'')).toUpperCase();}

function icon(cumpl,intens,aplica,mes){
  const ok=cumpl===10;
  const sym=ok?'✅':'❌';
  const useHalo=aplica==='APLICA'&&intens>0;
  const hc=useHalo?'h'+Math.min(intens,3):'h0';
  const tip=`${mes}: ${ok?'Cumple ✅':'No Cumple ❌'}${useHalo?' · Intensidad '+intens:''}`;
  return `<div class="ic ${hc}" title="${tip}">${sym}</div>`;
}

function render(){
  const tbody=document.getElementById('tbody');
  const tfoot=document.getElementById('tfoot');
  const srch=document.getElementById('srch').value.toLowerCase();

  const totM=Array(12).fill(0), cntM=Array(12).fill(0);
  let rows='';

  DATA.forEach(d=>{
    const [bg,fg]=avatarBg(d.n);
    const ini=getInitials(d.n);
    const pct=Math.round((d.s/120)*100);
    const sc=scoreColor(pct);
    const fPill=d.f==='Ok'
      ?`<span class="pill pill-ok">✅ OK</span>`
      :`<span class="pill pill-nok">❌ NOK</span>`;
    const aPill=d.a==='APLICA'
      ?`<span class="pill pill-aplica">APLICA</span>`
      :`<span class="pill pill-no">NO</span>`;

    let cells='';
    d.c.forEach((v,i)=>{
      const intens=d.a==='APLICA'?d.h[i]:0;
      cells+=`<td>${icon(v,intens,d.a,MESES[i])}</td>`;
      if(v===10)totM[i]++;
      cntM[i]++;
    });

    const show=d.n.toLowerCase().includes(srch);
    const fok=d.f.toLowerCase();
    const haHalo=d.h.some(x=>x>0);

    rows+=`<tr data-f="${fok}" data-a="${d.a}" data-halo="${haHalo?1:0}" data-name="${d.n.toLowerCase()}" ${show?'':''}>
      <td>
        <div class="exec-wrap">
          <div class="avatar" style="background:linear-gradient(135deg,${bg},${avatarBg(d.n)[1]})">${ini}</div>
          <div class="exec-info"><div class="en">${d.n}</div></div>
        </div>
      </td>
      ${cells}
      <td>
        <div class="score-wrap">
          <span class="score-num" style="color:${sc}">${d.s}</span>
          <div class="score-bar"><div class="score-fill" style="width:${pct}%;background:${sc}"></div></div>
        </div>
      </td>
      <td>${fPill}</td>
      <td>${aPill}</td>
    </tr>`;
  });

  tbody.innerHTML=rows;

  // Footer
  let fc=`<td>% Cumplimiento / Mes</td>`;
  for(let i=0;i<12;i++){
    const p=cntM[i]>0?Math.round((totM[i]/cntM[i])*100):0;
    const cls=p>=80?'fg':p>=50?'fm':'fr';
    fc+=`<td class="${cls}">${p}%</td>`;
  }
  fc+=`<td colspan="3"></td>`;
  tfoot.innerHTML=`<tr>${fc}</tr>`;

  updateStats();
  applyFilter();
}

function updateStats(){
  const total=DATA.length;
  const ok=DATA.filter(d=>d.f==='Ok').length;
  const aplica=DATA.filter(d=>d.a==='APLICA').length;
  const halo=DATA.filter(d=>d.h.some(x=>x>0)).length;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="sv">${total}</div><div class="sl">Total</div></div>
    <div class="stat-card"><div class="sv" style="color:#4ade80">${ok}</div><div class="sl">✅ OK</div></div>
    <div class="stat-card"><div class="sv" style="color:#f87171">${total-ok}</div><div class="sl">❌ NOK</div></div>
    <div class="stat-card"><div class="sv" style="color:#38bdf8">${aplica}</div><div class="sl">APLICA</div></div>
    <div class="stat-card"><div class="sv" style="color:#fb923c">${halo}</div><div class="sl">🟠 Intens.</div></div>
  `;
}

function applyFilter(){
  const srch=document.getElementById('srch').value.toLowerCase();
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    const nombre=tr.dataset.name||'';
    const matchSearch=nombre.includes(srch);
    let matchFilter=true;
    if(filtroAct==='ok') matchFilter=tr.dataset.f==='ok';
    else if(filtroAct==='nok') matchFilter=tr.dataset.f==='nok';
    else if(filtroAct==='aplica') matchFilter=tr.dataset.a==='APLICA';
    else if(filtroAct==='halo') matchFilter=tr.dataset.halo==='1';
    tr.classList.toggle('hidden',!(matchSearch&&matchFilter));
  });
}

function fil(tipo){
  filtroAct=tipo;
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  const map={todos:'bTodos',ok:'bOk',nok:'bNok',aplica:'bAplica',halo:'bHalo'};
  document.getElementById(map[tipo])?.classList.add('active');
  applyFilter();
}

document.getElementById('srch').addEventListener('input',applyFilter);
render();
</script>
</body>
</html>
